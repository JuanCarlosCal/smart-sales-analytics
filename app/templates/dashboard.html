<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Sales Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-chart-line"></i> Smart Sales
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Dashboard</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container-fluid">
            <!-- Page Header -->
            <div class="page-header">
                <h1><i class="fas fa-tachometer-alt"></i> Dashboard de Ventas</h1>
                <p>Análisis en tiempo real de tu desempeño comercial</p>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <!-- Total Income Card -->
                <div class="stat-card income">
                    <div class="stat-icon">
                        <i class="fas fa-dollar-sign"></i>
                    </div>
                    <div class="stat-label">Ingresos Totales</div>
                    <div class="stat-value">${{ ingresos }}</div>
                    <div class="stat-subtitle">Este periodo</div>
                </div>

                <!-- Best Product Card -->
                <div class="stat-card product">
                    <div class="stat-icon">
                        <i class="fas fa-star"></i>
                    </div>
                    <div class="stat-label">Producto Más Vendido</div>
                    <div class="stat-value">{{ producto }}</div>
                    <div class="stat-subtitle">Top ventas</div>
                </div>

                <!-- Average Sale Card -->
                <div class="stat-card average">
                    <div class="stat-icon">
                        <i class="fas fa-chart-bar"></i>
                    </div>
                    <div class="stat-label">Promedio de Venta</div>
                    <div class="stat-value">${{ promedio }}</div>
                    <div class="stat-subtitle">Valor promedio</div>
                </div>
            </div>

            <!-- Chart Section -->
            <div class="chart-section">
                <h2>
                    <i class="fas fa-chart-area"></i> Gráfico de Ventas
                </h2>
                <div class="chart-container">
                    <img src="/charts/ventas_chart.png" alt="Gráfico de ventas" loading="lazy">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
